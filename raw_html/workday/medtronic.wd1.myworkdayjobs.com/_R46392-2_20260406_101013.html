    <meta name="description" property="og:description" content="At Medtronic you can begin a life-long career of exploration and innovation, while helping champion healthcare access and equity for all. You’ll lead with purpose, breaking down barriers to innovation in a more connected, compassionate world. A Day in the Life At Medtronic, we’re pioneering the use of AI and computer vision to revolutionize healthcare. Our work drives the development of advanced medical devices by transforming image data into actionable insights. We are seeking a Lead Data Scientist specializing in computer vision to lead the creation of cutting-edge AI models, unlocking new possibilities for patient care and clinical outcomes. Responsibilities may include the following and other duties may be assigned Collaborate with cross-functional teams, including radiologists, clinical experts, and product managers, to define AI-powered solutions in the medical imaging domain. Lead the design and execution of advanced computer vision pipelines for tasks like image segmentation, object detection, classification, and anomaly detection using medical images (CT, MRI, X-ray, ultrasound). Drive preprocessing of large-scale medical image datasets, addressing noise reduction, normalization, and other domain-specific challenges. Research, design, and implement state-of-the-art deep learning algorithms using frameworks like TensorFlow, PyTorch, or equivalent for medical imaging use cases. Ensure scalability and efficiency of AI models by optimizing them for deployment on cloud and edge devices. Perform rigorous validation and testing of models to ensure they meet regulatory and clinical standards for safety and accuracy. Mentor a team of data scientists and engineers, providing technical guidance and fostering an environment of innovation. Stay at the forefront of advancements in computer vision and medical imaging, integrating cutting-edge techniques into product development. Publish and present research findings in internal forums or relevant conferences, contributing to the company’s thought leadership in AI and healthcare. Required Knowledge and Experience 10+ years of experience in data science or AI, with at least 6+ years focused on computer vision applications. Proven expertise in medical imaging analysis, including working with modalities such as CT, MRI, X-ray, and ultrasound. Advanced proficiency in Python and deep learning frameworks (TensorFlow, PyTorch). Deep understanding of computer vision techniques, including image segmentation, feature extraction, object detection, and generative models. Experience in handling large-scale image datasets, including data wrangling, augmentation, and preprocessing. Strong knowledge of DICOM formats, PACS systems, and medical data compliance standards. Ability to work within regulated environments and familiarity with FDA/CE requirements for AI in medical devices. Excellent communication skills to convey complex AI concepts to non-technical stakeholders and clinical collaborators. B.Tech / Masters / Ph.D. in Computer Science, Biomedical Engineering, Electrical Engineering, or a related field with a focus on computer vision or AI. 10+ years of professional experience in data science, AI, or machine learning roles, with a track record of leadership in complex projects. Physical Job Requirements The above statements are intended to describe the general nature and level of work being performed by employees assigned to this position, but they are not an exhaustive list of all the required responsibilities and skills of this position.  Benefits &amp;amp; Compensation Medtronic offers a competitive Salary and flexible Benefits Package A commitment to our employees lives at the core of our values. We recognize their contributions. They share in the success they help to create. We offer a wide range of benefits, resources, and competitive compensation plans designed to support you at every career and life stage. This position is eligible for a short-term incentive called the Medtronic Incentive Plan (MIP). About Medtronic We lead global healthcare technology and boldly attack the most challenging health problems facing humanity by searching out and finding solutions. Our Mission — to alleviate pain, restore health, and extend life — unites a global team of 95,000+ passionate people. We are engineers at heart— putting ambitious ideas to work to generate real solutions for real people. From the R&amp;amp;D lab, to the factory floor, to the conference room, every one of us experiments, creates, builds, improves and solves. We have the talent, diverse perspectives, and guts to engineer the extraordinary. Learn more about our business, mission, and our commitment to diversity here We lead global healthcare technology and boldly attack the most challenging health problems facing humanity by searching out and finding solutions. Our Mission — to alleviate pain, restore health, and extend life — unites a global team of 95,000+ passionate people. We are engineers at heart— putting ambitious ideas to work to generate real solutions for real people. From the R&amp;amp;D lab, to the factory floor, to the conference room, every one of us experiments, creates, builds, improves and solves. We have the talent, diverse perspectives, and guts to engineer the extraordinary. We change lives. Each team member, each day, helps to improve and redefine how the world treats the most pressing health conditions, from heart disease to diabetes. Our industry leadership comes from the passion and ingenuity of our people. That’s who we are. Working alongside one another, we use science, medicine, and a profound understanding of the human body to build extraordinary technologies that can transform lives. We build extraordinary solutions as one team. With one Medtronic Mindset defining how we work. Speed and decisiveness run through our DNA. Diverse perspectives inspire our bold answers to any challenge that comes our way. And we deliver results the right way, breakthrough after patient breakthrough. This life-changing career is yours to engineer. By bringing your ambitious ideas, unique perspective and contributions, you will… Build a better future, amplifying your impact on the causes that matter to you and the world Grow a career reflective of your passion and abilities Connect to a dynamic and inclusive culture that welcomes the challenge of life-long learning These commitments set our team apart from the rest: Experiences that put people first. Respect for people is the hallmark of our humanity. It fuels our team to positively impact even a single life. And it means we put our people first at Medtronic as well, creating a culture of belonging and always pushing to get you the career-building resources you need. Life-transforming technologies. No matter your role, you contribute to technologies that transform lives. What we build empowers patients to live life on their terms. Better outcomes for our world. Here, it’s about more than the bottom line. Our Mission to improve human welfare drives us. We advance healthcare, society, and equity with every design, inside and outside our walls. Insight-driven care. Fresh viewpoints. Cutting-edge AI, data, and automation. You&#39;re shaping the future of healthcare technology and defining the next generation of breakthroughs in care It is the policy of Medtronic to provide equal employment opportunity (EEO) to all persons regardless of age, color, national origin, citizenship status, physical or mental disability, race, religion, creed, gender, sex, sexual orientation, gender identity and/or expression, genetic information, marital status, status with regard to public assistance, veteran status, or any other characteristic protected by federal, state or local law. In addition, Medtronic will provide reasonable accommodations for qualified individuals with disabilities. For sales reps and other patient facing field employees, going into a healthcare setting is considered an essential function of the job and we expect our employees to comply with all credentialing requirements at the hospitals or clinics they support. This employer participates in the federal E-Verify program to confirm the identity and employment authorization of all newly hired employees. For further information about the E-Verify program, please click here. For updates on job applications, please go to the candidate login page and sign in to check your application status. If you need assistance completing your application please email AskHR@medtronic.com To request removal of your personal information from our systems please email RS.HRCompliance@medtronic.com">
