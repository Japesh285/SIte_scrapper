    <meta name="description" property="og:description" content="We anticipate the application window for this opening will close on - 13 May 2026 Position Description: Principal Financial Analyst for Medtronic, Inc., located in Lafayette, CO. Responsible for monthly and quarterly financial forecasting for the Neurosurgery/Enabling Technologies (ET) business. Responsible for collaborating with functional leaders to develop and communicate financial forecast risks and opportunities and ensure forecast and targets are understood. Responsible for financial mgmt. &amp;amp; modeling of business initiatives, developing annual operating plan, cost control, monthly forecasting, financial planning, and investment analysis. Conduct financial audit of internal financial reports across multiple financial sources to ensure data integrity. Conduct headcount analysis and projections to ensure alignment with business goals, project requirements and budgetary constraints. Collaborate with senior leadership to provide actionable insights and drive financial performance. Develop and maintain advanced financial models to evaluate business initiatives, track performance, and project outcomes by leveraging formulas including Power Query, Dynamic Array Formulas, Advanced Data Analysis, and Logical/Conditional Formulas. Create Excel dashboards with graphs and Key Performance Indicators (KPIs) and using Power BI, Enterprise Resource Planning (ERP) Systems onboarding, implementation and ongoing usage. Follow GAAP (Generally Accepted Accounting Principles). Deliver financial analytics and projections of revenue, Profit &amp;amp; Loss (P&amp;amp;L) and KPIs using advanced modeling and Return On Investment (ROI) calculations on new initiatives to support business growth and inform leadership of investment decisions. Leverage financial knowledge from experience in the Medical Technology industry with surgical robotics. *Position works a hybrid model and will be onsite in Lafayette, CO – 4 days per week. Relocation assistance is not available for this position. #LI-DNI. Basic Qualifications: Masters’ Degree or foreign equivalent in Economics, Accounting, Math, Statistics or related financial field and five (5) years of experience as a Financial Analyst or related occupation. Must possess at least five (5) years’ experience with each of the following: Financial mgmt. and modeling for large-scale technology projects, including cost control, financial forecasting, financial planning, and investment analysis; Reviewing and verifying internal financial reports from multiple sources; Conducting headcount analyses to align business need with financial targets; Presenting financial insights to executive leadership and cross-functional teams; Financial modeling in Microsoft Excel using advanced formulas including Power Query, Dynamic Array Formulas, Advanced Data Analysis, and Logical/Conditional Formulas; Creating Excel dashboards with graphs and KPIs and using Power BI, ERP Systems onboarding, implementation and ongoing usage; GAAP; Conducting financial analytics through projections of revenue, P&amp;amp;L and KPIs using advanced modeling and ROI calculations; Must possess at least two (2) years’ experience with Financial Medical Technology industry with surgical robotics. Salary: $134,500 - $162,000 per year The following benefits and additional compensation are available to those regular employees who work 20+ hours per week: Health, Dental and vision insurance, Health Savings Account, Healthcare Flexible Spending Account, Life insurance, Long-term disability leave, Dependent daycare spending account, Tuition assistance/reimbursement, and Simple Steps (global well-being program). The following benefits and additional compensation are available to all regular employees: Incentive plans, 401(k) plan plus employer contribution and match, Short-term disability, Paid time off, Paid holidays, Employee Stock Purchase Plan, Employee Assistance Program, Non-qualified Retirement Plan Supplement (subject to IRS earning minimums), and Capital Accumulation Plan (available to Vice Presidents and above, or subject to IRS earning minimums). Regular employees are those who are not temporary, such as interns. Temporary employees are eligible for paid sick time, as required under applicable state law, and the Employee Stock Purchase Plan. Please note some of the above benefits may not apply to workers in Puerto Rico. Further details are available at the link below: Medtronic benefits and compensation plans Use this link to hyperlink https://www3.benefitsolver.com/benefits/BenefitSolverView?page_name=signon&amp;amp;co_num=30601&amp;amp;co_affid=medtronic We lead global healthcare technology and boldly attack the most challenging health problems facing humanity by searching out and finding solutions. Our Mission — to alleviate pain, restore health, and extend life — unites a global team of 95,000+ passionate people. We are engineers at heart— putting ambitious ideas to work to generate real solutions for real people. From the R&amp;amp;D lab, to the factory floor, to the conference room, every one of us experiments, creates, builds, improves and solves. We have the talent, diverse perspectives, and guts to engineer the extraordinary. We change lives. Each team member, each day, helps to improve and redefine how the world treats the most pressing health conditions, from heart disease to diabetes. Our industry leadership comes from the passion and ingenuity of our people. That’s who we are. Working alongside one another, we use science, medicine, and a profound understanding of the human body to build extraordinary technologies that can transform lives. We build extraordinary solutions as one team. With one Medtronic Mindset defining how we work. Speed and decisiveness run through our DNA. Diverse perspectives inspire our bold answers to any challenge that comes our way. And we deliver results the right way, breakthrough after patient breakthrough. This life-changing career is yours to engineer. By bringing your ambitious ideas, unique perspective and contributions, you will… Build a better future, amplifying your impact on the causes that matter to you and the world Grow a career reflective of your passion and abilities Connect to a dynamic and inclusive culture that welcomes the challenge of life-long learning These commitments set our team apart from the rest: Experiences that put people first. Respect for people is the hallmark of our humanity. It fuels our team to positively impact even a single life. And it means we put our people first at Medtronic as well, creating a culture of belonging and always pushing to get you the career-building resources you need. Life-transforming technologies. No matter your role, you contribute to technologies that transform lives. What we build empowers patients to live life on their terms. Better outcomes for our world. Here, it’s about more than the bottom line. Our Mission to improve human welfare drives us. We advance healthcare, society, and equity with every design, inside and outside our walls. Insight-driven care. Fresh viewpoints. Cutting-edge AI, data, and automation. You&#39;re shaping the future of healthcare technology and defining the next generation of breakthroughs in care It is the policy of Medtronic to provide equal employment opportunity (EEO) to all persons regardless of age, color, national origin, citizenship status, physical or mental disability, race, religion, creed, gender, sex, sexual orientation, gender identity and/or expression, genetic information, marital status, status with regard to public assistance, veteran status, or any other characteristic protected by federal, state or local law. In addition, Medtronic will provide reasonable accommodations for qualified individuals with disabilities. For sales reps and other patient facing field employees, going into a healthcare setting is considered an essential function of the job and we expect our employees to comply with all credentialing requirements at the hospitals or clinics they support. This employer participates in the federal E-Verify program to confirm the identity and employment authorization of all newly hired employees. For further information about the E-Verify program, please click here. For updates on job applications, please go to the candidate login page and sign in to check your application status. If you need assistance completing your application please email AskHR@medtronic.com To request removal of your personal information from our systems please email RS.HRCompliance@medtronic.com">
